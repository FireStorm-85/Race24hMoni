<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>24h Nürburgring – Live Standing (echt geparst)</title>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<style>
:root{--bg:#050708;--card:#101618;--accent:#00ff88;--red:#ff4040;--txt:#e7ecef;--mut:#8d9aa0;--line:#1c262b}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:Inter,system-ui,Arial,sans-serif;height:100vh;display:flex;flex-direction:column}
header{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:#0a0f11;border-bottom:1px solid var(--line)}
.logo{display:flex;gap:10px;align-items:center;font-weight:800}
.logo div{width:36px;height:36px;background:var(--accent);color:#000;display:grid;place-items:center;border-radius:8px}
.live{display:flex;gap:8px;align-items:center}
.dot{width:8px;height:8px;background:var(--red);border-radius:50%;animation:bl 1.3s infinite}
@keyframes bl{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}
main{flex:1;display:grid;grid-template-rows:50vh 1fr;gap:12px;padding:12px;min-height:0}

.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.ph{padding:8px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:#a7c7b8}
.ticker{overflow:auto;padding:8px;flex:1}
.msg{background:#0c1214;border-left:3px solid var(--accent);margin-bottom:7px;padding:7px 9px;border-radius:6px;font-size:12px}
.msg.warn{border-left-color:var(--red)}
.table{overflow:auto;flex:1}
table{width:100%;border-collapse:collapse;font-size:13px}
th{position:sticky;top:0;background:#0d1416;padding:7px 9px;text-align:left;color:#9bb2aa;border-bottom:1px solid var(--line);font-size:11px;text-transform:uppercase}
td{padding:7px 9px;border-bottom:1px solid #152024;white-space:nowrap}
tr:hover{background:#0f181b}
.pos{font-weight:700;width:40px}
.p1{color:var(--accent)}
.car{color:#b5c4c9;max-width:180px;overflow:hidden;text-overflow:ellipsis}
.drivers{max-width:240px;overflow:hidden;text-overflow:ellipsis}
.gap{font-variant-numeric:tabular-nums}
.status{font-size:11px;padding:2px 6px;border-radius:6px;background:#13251c;color:var(--accent);border:1px solid #1e3d2b}
</style>
</head>
<body>
<header>
 <div class="logo"><div>24h</div><span>NÜRBURGRING LIVE</span></div>
 <div class="live" style="gap:12px;flex-wrap:wrap">
   <div style="display:flex;align-items:center;gap:6px"><div class="dot" id="flagdot" style="background:#00ff88"></div><span id="flag" style="font-weight:700">GREEN</span></div>
   <div>Rennzeit: <span id="racetime">--:--:--</span> / Rest: <span id="remaining">24:00:00</span></div>
   <div id="weather" style="opacity:.9">Wetter: --°C</div>
   <div style="opacity:.7">Uhr: <span id="time">--:--:--</span></div>
 </div>
 <div><button onclick="location.reload()" style="background:#152024;color:#fff;border:1px solid #2a3a40;padding:6px 10px;border-radius:8px;cursor:pointer">Neu laden</button></div>
</header>
<main>
 <div class="panel">
   <div class="ph">Live-Ticker <span class="status" id="ts">init</span></div>
   <div class="ticker" id="tk"></div>
 </div>
 <div class="panel">
   <div class="ph">Standing – Platz / Fahrer / Auto / Zeit <span class="status" id="ss">init</span></div>
   <div class="table"><table><thead><tr><th>Pl</th><th>Nr</th><th>Fahrer</th><th>Auto</th><th>Zeit</th><th>R</th><th>Gap</th></tr></thead><tbody id="st"></tbody></table></div>
 </div>
</main>
<script>
const RACE_START = new Date('2026-05-16T15:00:00+02:00').getTime();
setInterval(()=>{
  const now=new Date();
  document.getElementById('time').textContent=now.toLocaleTimeString('de-DE');
  const elapsed=Math.max(0, Math.floor((now.getTime()-RACE_START)/1000));
  const h=String(Math.floor(elapsed/3600)).padStart(2,'0');
  const m=String(Math.floor((elapsed%3600)/60)).padStart(2,'0');
  const s=String(elapsed%60).padStart(2,'0');
  document.getElementById('racetime').textContent=`${h}:${m}:${s}`;
  const total=24*3600;
  const rem=Math.max(0, total-elapsed);
  const rh=String(Math.floor(rem/3600)).padStart(2,'0');
  const rm=String(Math.floor((rem%3600)/60)).padStart(2,'0');
  const rs=String(rem%60).padStart(2,'0');
  document.getElementById('remaining').textContent=`${rh}:${rm}:${rs}`;
},1000);
// Flaggen aus Ticker erkennen
function updateFlag(txt){
  const f=document.getElementById('flag');const d=document.getElementById('flagdot');
  let status='GREEN'; let color='#00ff88'; let sector='';
  if(/Code 60|Slow Zone|Gelb|gelb|Safety/i.test(txt)){status='YELLOW';color='#ffcc00';}
  else if(/Rot|Abbruch|Red Flag/i.test(txt)){status='RED';color='#ff4040';}
  // Sektor erkennen
  const secMatch=txt.match(/Sektor\s*\d+|Sector\s*\d+|Breidscheid|Karussell|Pflanzgarten|Schwalbenschwanz|Döttinger|Brünnchen|Hatzenbach|Hohe Acht|Flugplatz|Bergwerk|Kesselchen|Galgenkopf|Adenauer|Metzgesfeld|Kallenhard|Wehrseifen|Ex-Mühle|Kottenborn/i);
  if(secMatch) sector=' • '+secMatch[0];
  f.textContent=status+sector; d.style.background=color;
}


function renderTicker(d){const e=document.getElementById('tk');e.innerHTML='';d.forEach(x=>{e.innerHTML+=`<div class="msg ${/Ausfall|Einschlag|Strafe/.test(x.txt)?'warn':''}"><b>${x.t} ${x.n}</b> – ${x.m} <i style="color:#8fa">${x.a}</i><br>${x.txt}</div>`}); if(d[0]) updateFlag(d[0].txt)}
async function loadTicker(){
 try{
   const proxy='https://api.allorigins.win/raw?url=';
   const url='https://www.24h-rennen.de/liveticker.php';
   const r=await fetch(proxy+encodeURIComponent(url),{cache:'no-store'});
   const t=await r.text();
   // parse simple table rows
   const parser=new DOMParser();
   const doc=parser.parseFromString(t,'text/html');
   const rows=[...doc.querySelectorAll('tr')].slice(1,40);
   const out=[];
   rows.forEach(tr=>{
     const tds=[...tr.querySelectorAll('td')];
     if(tds.length>=2){
       const tm=tds[0].textContent.trim();
       const txt=tds[1].textContent.trim();
       const nr=(txt.match(/#\d+/)?txt.match(/#\d+/)[0]:'');
       const car=(txt.match(/Porsche|BMW|Mercedes|Audi|Ferrari|Lamborghini|Ford|Aston|McLaren/i)?txt.match(/Porsche|BMW|Mercedes|Audi|Ferrari|Lamborghini|Ford|Aston|McLaren/i)[0]:'');
       out.push({t:tm,n:nr,m:'',a:car,txt:txt});
     }
   });
   if(out.length){renderTicker(out);document.getElementById('ts').textContent='LIVE';return}
 }catch(e){console.log(e)}
 document.getElementById('ts').textContent='warte...';
}

// --- ECHTES PARSING ---
async function loadStanding(){
  const out=document.getElementById('sd');
  out.innerHTML = `<iframe src="https://www.timing71.org/embedded/nurburgring-24h" style="width:100%;height:100%;border:0;background:#0b1215" loading="lazy"></iframe><div style="position:absolute;top:4px;right:8px;font-size:11px;color:#8fa">timing71</div>`;
  document.getElementById('ss').textContent='timing71 iframe';
}

loadTicker();loadStanding();loadWeather();
setInterval(loadTicker,20000);
setInterval(loadStanding,25000);

async function loadWeather(){
 try{
  const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=50.33&longitude=6.95&current=temperature_2m,precipitation,weather_code,wind_speed_10m');
  const j=await r.json();
  const t=Math.round(j.current.temperature_2m);
  const w=j.current.wind_speed_10m;
  const p=j.current.precipitation;
  document.getElementById('weather').textContent=`Nürburg: ${t}°C, Wind ${w}km/h${p>0?`, Regen ${p}mm`:''}`;
 }catch(e){document.getElementById('weather').textContent='Wetter: n/a'}
}
loadWeather(); setInterval(loadWeather, 600000);

</script>
</body>
</html>
